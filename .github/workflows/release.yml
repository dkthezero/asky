name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # Publish to crates.io
  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # Build binaries for each platform
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../asky-${{ github.ref_name }}-${{ matrix.target }}.tar.gz asky
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: asky-${{ matrix.target }}
          path: asky-${{ github.ref_name }}-${{ matrix.target }}.tar.gz

  # Create GitHub release and update Homebrew tap
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz > sha256sums.txt
          cat sha256sums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/sha256sums.txt

      - name: Update Homebrew formula
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          MAC_INTEL_SHA=$(sha256sum artifacts/asky-${GITHUB_REF_NAME}-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)
          MAC_ARM_SHA=$(sha256sum artifacts/asky-${GITHUB_REF_NAME}-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)
          LINUX_INTEL_SHA=$(sha256sum artifacts/asky-${GITHUB_REF_NAME}-x86_64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)
          LINUX_ARM_SHA=$(sha256sum artifacts/asky-${GITHUB_REF_NAME}-aarch64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)
          TAG="${GITHUB_REF_NAME}"

          mkdir -p Formula
          cat > Formula/asky.rb << FORMULA
          class Asky < Formula
            desc "A terminal-based vault management tool"
            homepage "https://github.com/dkthezero/asky"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/dkthezero/asky/releases/download/${TAG}/asky-${TAG}-aarch64-apple-darwin.tar.gz"
                sha256 "${MAC_ARM_SHA}"
              else
                url "https://github.com/dkthezero/asky/releases/download/${TAG}/asky-${TAG}-x86_64-apple-darwin.tar.gz"
                sha256 "${MAC_INTEL_SHA}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/dkthezero/asky/releases/download/${TAG}/asky-${TAG}-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${LINUX_ARM_SHA}"
              else
                url "https://github.com/dkthezero/asky/releases/download/${TAG}/asky-${TAG}-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${LINUX_INTEL_SHA}"
              end
            end

            def install
              bin.install "asky"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/asky --version")
            end
          end
          FORMULA

          sed -i 's/^          //' Formula/asky.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/asky.rb
          git commit -m "chore: update homebrew formula to ${VERSION}"
          git push origin HEAD:master
