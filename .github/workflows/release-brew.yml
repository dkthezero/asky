name: Release Brew

on:
  workflow_run:
    workflows: ["Release Crates"]
    types:
      - completed

jobs:
  update-homebrew:
    name: Update Homebrew tap
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Get tag from triggering workflow
        run: |
          TAG="${{ github.event.workflow_run.head_branch }}"
          echo "TAG=${TAG}" >> $GITHUB_ENV
          echo "VERSION=${TAG#v}" >> $GITHUB_ENV

      - name: Download release assets and compute checksums
        run: |
          mkdir -p artifacts
          for target in x86_64-apple-darwin aarch64-apple-darwin x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu; do
            curl -sL "https://github.com/dkthezero/agk/releases/download/${TAG}/agk-${TAG}-${target}.tar.gz" -o "artifacts/agk-${TAG}-${target}.tar.gz"
          done
          cd artifacts
          sha256sum *.tar.gz

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          MAC_INTEL_SHA=$(sha256sum artifacts/agk-${TAG}-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)
          MAC_ARM_SHA=$(sha256sum artifacts/agk-${TAG}-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)
          LINUX_INTEL_SHA=$(sha256sum artifacts/agk-${TAG}-x86_64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)
          LINUX_ARM_SHA=$(sha256sum artifacts/agk-${TAG}-aarch64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)

          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/dkthezero/homebrew-agk.git tap
          cd tap

          cat > Formula/agk.rb << 'EOF'
          class Agk < Formula
            desc "A terminal-based vault management tool"
            homepage "https://github.com/dkthezero/agk"
            version "VERSION_PLACEHOLDER"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/dkthezero/agk/releases/download/TAG_PLACEHOLDER/agk-TAG_PLACEHOLDER-aarch64-apple-darwin.tar.gz"
                sha256 "MAC_ARM_SHA_PLACEHOLDER"
              else
                url "https://github.com/dkthezero/agk/releases/download/TAG_PLACEHOLDER/agk-TAG_PLACEHOLDER-x86_64-apple-darwin.tar.gz"
                sha256 "MAC_INTEL_SHA_PLACEHOLDER"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/dkthezero/agk/releases/download/TAG_PLACEHOLDER/agk-TAG_PLACEHOLDER-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "LINUX_ARM_SHA_PLACEHOLDER"
              else
                url "https://github.com/dkthezero/agk/releases/download/TAG_PLACEHOLDER/agk-TAG_PLACEHOLDER-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "LINUX_INTEL_SHA_PLACEHOLDER"
              end
            end

            def install
              bin.install "agk"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/agk --version")
            end
          end
          EOF

          sed -i 's/^          //' Formula/agk.rb
          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/g" Formula/agk.rb
          sed -i "s/TAG_PLACEHOLDER/${TAG}/g" Formula/agk.rb
          sed -i "s/MAC_ARM_SHA_PLACEHOLDER/${MAC_ARM_SHA}/g" Formula/agk.rb
          sed -i "s/MAC_INTEL_SHA_PLACEHOLDER/${MAC_INTEL_SHA}/g" Formula/agk.rb
          sed -i "s/LINUX_ARM_SHA_PLACEHOLDER/${LINUX_ARM_SHA}/g" Formula/agk.rb
          sed -i "s/LINUX_INTEL_SHA_PLACEHOLDER/${LINUX_INTEL_SHA}/g" Formula/agk.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/agk.rb
          git commit -m "Update agk to ${VERSION}"
          git push
